<div class="wrapper">
    <div class="contribute">
        <h4>Đóng góp</h4>
        <button mat-stroked-button class="write-review" (click)="openWriteReview()">
            <mat-icon svgIcon="icon-write"></mat-icon>
            <span>Đánh giá</span>
        </button>
    </div>

    <h4>Đánh giá của du khách</h4>

    <div class="show-reviews">
        <div class="rating">

            <div class="rating-statistics">
                <div class="text">
                    <span>Xuất sắc</span>
                    <span>100</span>
                </div>
                <mat-progress-bar class="rates-num" mode="determinate" value="60"></mat-progress-bar>
            </div>

            <div class="rating-statistics">
                <div class="text">
                    <span>Rất tốt</span>
                    <span>20</span>
                </div>
                <mat-progress-bar class="rates-num" mode="determinate" value="20"></mat-progress-bar>
            </div>

            <div class="rating-statistics">
                <div class="text">
                    <span>Bình thường</span>
                    <span>10</span>
                </div>
                <mat-progress-bar class="rates-num" mode="determinate" value="10"></mat-progress-bar>
            </div>

            <div class="rating-statistics">
                <div class="text">
                    <span>Khá tệ</span>
                    <span>5</span>
                </div>
                <mat-progress-bar class="rates-num" mode="determinate" value="5"></mat-progress-bar>
            </div>

            <div class="rating-statistics">
                <div class="text">
                    <span>Tệ</span>
                    <span>5</span>
                </div>
                <mat-progress-bar class="rates-num" mode="determinate" value="5"></mat-progress-bar>
            </div>
        </div>

        <mat-divider vertical></mat-divider>

        <div class="user-reviews">
            <div class="review" *ngFor="let review of reviewsList">
                <div class="account">
                    <div class="avatar">
                        <img [src]="review.account.avatar" alt="">
                    </div>
                    <div class="content">
                        <h6>{{ review.account.fullname }}</h6>
                        <span>Tham gia từ {{ review.account.createdAt | date: 'MM/yyyy'}}</span>
                    </div>
                </div>
                <app-star-rating [showVote]="review.vote"></app-star-rating>
                <h6>{{ review.title }}</h6>
                <span>{{ review.text }}</span>

                <div class="images">
                    <img *ngFor="let img of review.images" [src]="img" alt="">
                </div>

                <span class="time">
                    <mat-divider></mat-divider>
                    Thời gian đi {{review.time | date: 'MM/yyyy'}}
                </span>
            </div>
        </div>
    </div>
</div>
