<div class="wrapper">
    <ng-container *ngIf="tourism">
        <div class="header">
            <div>
                <h1>{{ tourism.name }}</h1>
                <h6 class="location">
                    <mat-icon svgIcon="icon-location"></mat-icon>
                    <span>{{ tourism.address }}</span>
                </h6>
            </div>
            <div class="action">
                <button mat-icon-button class="action-icon-btn">
                    <mat-icon svgIcon="icon-heart-unlike"></mat-icon>
                </button>

                <button mat-icon-button class="action-icon-btn">
                    <mat-icon svgIcon="icon-share"></mat-icon>
                </button>
            </div>
        </div>

        <div class="sub-header">
            <span>1234 reviews</span>
            <span>Key word</span>
        </div>

        <div class="content">
            <div class="about">
                <h4>Giới thiệu</h4>
                {{ tourism.about }}
            </div>

            <div class="images">
                <img [src]="tourism.images[0]" alt="">
            </div>
        </div>
    </ng-container>
</div>
