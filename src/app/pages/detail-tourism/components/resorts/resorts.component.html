<h3>Khu nghỉ dưỡng</h3>

<div class="resorts">
    <mat-card class="resort-card-horizontal" *ngFor="let resort of resortsList; let idx = index">
        <div class="item-card">
            <img class="images-content" [src]="resort.images[0]" alt="Photo of a Resort">
            <div class="content">
                <mat-card-header>
                    <mat-card-title>
                        <h5><a routerLink="/resort/{{resort._id}}">
                                {{idx + 1}}. {{ resort.name }}
                            </a></h5>
                    </mat-card-title>
                </mat-card-header>
                <mat-card-actions>
                    <button mat-icon-button class="action-icon-btn">
                        <mat-icon svgIcon="icon-heart-unlike"></mat-icon>
                    </button>
                    <button mat-icon-button class="action-icon-btn">
                        <mat-icon svgIcon="icon-share"></mat-icon>
                    </button>
                </mat-card-actions>
            </div>
        </div>
    </mat-card>
</div>
