<div class="header">
    <div class="logo">
        <img src="assets\images\logo.jpg" alt="" srcset="">
    </div>

    <app-search (searchEmitter)="getTextSearch($event)" class="search"></app-search>

    <div class="tools">
        <button mat-button class="tool-btn">
            <mat-icon svgIcon="icon-heart-unlike"></mat-icon>
            <span>Yêu thích</span>
        </button>

        <button mat-button class="tool-btn">
            <mat-icon svgIcon="icon-shopping-cart"></mat-icon>
            <span>Giỏ hàng</span>
        </button>

        <button mat-button class="tool-btn">
            <span>Đăng nhập</span>
        </button>
    </div>
</div>
