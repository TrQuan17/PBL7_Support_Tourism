<div class="write" *ngIf="authResponse">
    <img class="avatar" [src]="account?.avatar" alt="Avatar" srcset="">
    <form class="write-post">
        <div class="text">
            <mat-form-field appearance="outline">
                <input matInput type="text" placeholder="Tiêu đề ...">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <textarea matInput rows="3" placeholder="Bạn đang nghĩ gì ..."></textarea>
            </mat-form-field>
        </div>

        <button class="upload-file-btn" (click)="fileInput.click()">
            <mat-icon class="custom" svgIcon="icon-upload-file"></mat-icon>
            <span>Ảnh ...</span>
        </button>
        <input hidden #fileInput type="file" id="file">

        <div class="image-upload"></div>
    </form>

    <button mat-stroked-button class="send-btn">
        <mat-icon svgIcon="icon-send"></mat-icon>
        <span>Đăng</span>
    </button>
</div>

<mat-divider *ngIf="authResponse"></mat-divider>

<div class="timeline">Time line o day ne</div>
