<div class="wrapper {{ dialogData.type }}">
    <div class="title">
        {{ dialogData.header }}
    </div>

    <div class="content">
        <img *ngIf="dialogData.image" [src]="dialogData.image" alt="">
        <p class="message">{{ dialogData.message }}</p>
    </div>

    <div class="action">
        <button mat-flat-button mat-dialog-close 
            cdkFocusInitial class="cancel">Hủy bỏ</button>
        <button mat-flat-button mat-dialog-close 
            (click)="confirm()" class="confirm">Xác nhận</button>
    </div>
</div>
